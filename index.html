<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="hud">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p class="value" id="best-score">0</p>
          </div>
          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div class="board-wrap">
          <div id="game-over-banner" class="banner hidden" role="status" aria-live="polite">
            Game over. Press restart to play again.
          </div>
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake game board"
          ></div>
        </div>

        <p class="help" id="status-text">
          Use arrow keys or WASD to move. Eat food, avoid walls and yourself.
        </p>

        <div class="controls" aria-label="Touch controls">
          <button class="control up" data-direction="up" type="button">Up</button>
          <button class="control left" data-direction="left" type="button">Left</button>
          <button class="control down" data-direction="down" type="button">Down</button>
          <button class="control right" data-direction="right" type="button">Right</button>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
